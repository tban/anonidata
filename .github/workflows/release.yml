name: Release - Build All Platforms

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Crear GitHub Release'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      release_tag:
        description: 'Tag del release (dejar vacío para usar versión de package.json)'
        required: false
        type: string

# Evitar releases concurrentes
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # =========================================
  # JOB 1: BUILD WINDOWS x64
  # =========================================
  build-windows-x64:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Compilar backend Python
        shell: pwsh
        run: |
          cd backend
          python -m venv venv
          .\venv\Scripts\activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m spacy download es_core_news_sm

          if (Test-Path "anonidata-backend-win.spec") {
            pyinstaller --clean anonidata-backend-win.spec
          } elseif (Test-Path "anonidata-backend.spec") {
            pyinstaller --clean anonidata-backend.spec
          } else {
            pyinstaller --onefile --console --name anonidata-backend --add-data "config;config" main.py
          }

          if (-not (Test-Path "dist\anonidata-backend.exe")) {
            Write-Error "Backend no compilado"
            exit 1
          }
          Write-Host "✓ Backend Windows x64 compilado"

      - name: Copiar backend y compilar Electron
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "backend\dist\anonidata-backend.exe" "dist\anonidata-backend.exe" -Force
          npm ci
          npm run build:renderer
          npm run build:main
          npx electron-builder --win --x64

      - name: Renombrar artefacto
        shell: pwsh
        run: |
          $exeFiles = Get-ChildItem "release\*.exe" -ErrorAction SilentlyContinue
          if ($exeFiles) {
            $target = "release\AnoniData-x64.exe"
            Copy-Item $exeFiles[0].FullName $target -Force
            Write-Host "✓ Renombrado a AnoniData-x64.exe"
          }

      - name: Subir artefacto Windows x64
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-build
          path: release/AnoniData-x64.exe
          if-no-files-found: error
          retention-days: 5

  # =========================================
  # JOB 2: BUILD WINDOWS ARM64
  # =========================================
  build-windows-arm64:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Compilar backend Python (x64 para emulación WoW64)
        shell: pwsh
        run: |
          cd backend
          python -m venv venv
          .\venv\Scripts\activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m spacy download es_core_news_sm

          if (Test-Path "anonidata-backend-win.spec") {
            pyinstaller --clean anonidata-backend-win.spec
          } elseif (Test-Path "anonidata-backend.spec") {
            pyinstaller --clean anonidata-backend.spec
          } else {
            pyinstaller --onefile --console --name anonidata-backend --add-data "config;config" main.py
          }

          if (-not (Test-Path "dist\anonidata-backend.exe")) {
            Write-Error "Backend no compilado"
            exit 1
          }
          Write-Host "✓ Backend Windows (x64 para ARM64 emulación) compilado"

      - name: Copiar backend y compilar Electron para ARM64
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "backend\dist\anonidata-backend.exe" "dist\anonidata-backend.exe" -Force
          npm ci
          npm run build:renderer
          npm run build:main
          npx electron-builder --win --arm64

      - name: Renombrar artefacto
        shell: pwsh
        run: |
          $exeFiles = Get-ChildItem "release\*.exe" -ErrorAction SilentlyContinue
          if ($exeFiles) {
            $target = "release\AnoniData-arm64.exe"
            Copy-Item $exeFiles[0].FullName $target -Force
            Write-Host "✓ Renombrado a AnoniData-arm64.exe"
          }

      - name: Subir artefacto Windows ARM64
        uses: actions/upload-artifact@v4
        with:
          name: windows-arm64-build
          path: release/AnoniData-arm64.exe
          if-no-files-found: error
          retention-days: 5

  # =========================================
  # JOB 3: BUILD macOS
  # =========================================
  build-mac:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Compilar backend Python
        run: |
          cd backend
          python3 -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m spacy download es_core_news_sm
          pyinstaller --clean anonidata-backend.spec

          if [ ! -f "dist/anonidata-backend" ]; then
            echo "✗ Backend no compilado"
            exit 1
          fi
          echo "✓ Backend macOS compilado"

      - name: Copiar backend y compilar Electron
        run: |
          mkdir -p dist
          cp backend/dist/anonidata-backend dist/anonidata-backend
          chmod +x dist/anonidata-backend
          npm ci
          npm run build:renderer
          npm run build:main
          npx electron-builder --mac --universal

      - name: Renombrar artefacto
        run: |
          DMG_FILE=$(find release -name "*.dmg" -type f | head -1)
          if [ -n "$DMG_FILE" ]; then
            cp "$DMG_FILE" "release/AnoniData.dmg"
            echo "✓ Renombrado a AnoniData.dmg"
          fi

      - name: Subir artefacto macOS
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: release/AnoniData.dmg
          if-no-files-found: error
          retention-days: 5

  # =========================================
  # JOB 4: CREAR RELEASE
  # =========================================
  create-release:
    needs: [build-windows-x64, build-windows-arm64, build-mac]
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.create_release == 'true' || github.event.inputs.create_release == '' }}
    permissions:
      contents: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Obtener versión
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="${{ github.event.inputs.release_tag }}"
          if [ -z "$TAG" ]; then
            TAG="v${VERSION}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Versión: $VERSION | Tag: $TAG"

      - name: Descargar artefacto Windows x64
        uses: actions/download-artifact@v4
        with:
          name: windows-x64-build
          path: release/

      - name: Descargar artefacto Windows ARM64
        uses: actions/download-artifact@v4
        with:
          name: windows-arm64-build
          path: release/

      - name: Descargar artefacto macOS
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: release/

      - name: Listar artefactos
        run: |
          echo "Artefactos descargados:"
          ls -lh release/

      - name: Crear Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "AnoniData ${{ steps.version.outputs.tag }}"
          body: |
            ## AnoniData ${{ steps.version.outputs.tag }}

            ### 📥 Descargas

            | Plataforma | Archivo | Tipo |
            |------------|---------|------|
            | 🪟 Windows x64 | `AnoniData-x64.exe` | Portable (no requiere instalación) |
            | 🪟 Windows ARM64 | `AnoniData-arm64.exe` | Portable para Surface Pro X, Lenovo X13s, etc. |
            | 🍎 macOS | `AnoniData.dmg` | Universal (Intel + Apple Silicon) |

            ### 💡 ¿Cuál descargar?
            - **Windows con procesador Intel/AMD** → `AnoniData-x64.exe`
            - **Windows con procesador ARM** (Surface Pro X, Snapdragon) → `AnoniData-arm64.exe`
            - **macOS** (cualquier Mac) → `AnoniData.dmg`

            ### 📝 Notas
            - Build automático desde rama `main`
            - Fecha: ${{ github.event.head_commit.timestamp || 'Manual dispatch' }}
            - La versión ARM64 de Windows usa el backend x64 bajo emulación WoW64
          files: |
            release/AnoniData-x64.exe
            release/AnoniData-arm64.exe
            release/AnoniData.dmg
          draft: true
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resumen
        run: |
          echo ""
          echo "========================================"
          echo "🚀 RELEASE CREADO"
          echo "========================================"
          echo ""
          echo "  Tag: ${{ steps.version.outputs.tag }}"
          echo "  Estado: Draft (revisa y publica manualmente)"
          echo ""
          echo "  Archivos incluidos:"
          echo "    - AnoniData-x64.exe   (Windows x64 portable)"
          echo "    - AnoniData-arm64.exe (Windows ARM64 portable)"
          echo "    - AnoniData.dmg       (macOS universal)"
          echo ""
          echo "========================================"
