name: Build Windows ARM64

on:
  workflow_dispatch:
  # Deshabilitado temporalmente hasta solucionar x64
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - 'src/**'
  #     - 'backend/**'
  #     - 'package.json'
  #     - 'forge.config.windows-arm.js'
  #     - '.github/workflows/build-windows-arm.yml'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Crear entorno virtual Python
        run: |
          cd backend
          python -m venv venv

      - name: Instalar dependencias Python
        run: |
          cd backend
          .\venv\Scripts\activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Descargar modelo spaCy
        run: |
          cd backend
          .\venv\Scripts\activate
          python -m spacy download es_core_news_sm

      - name: Compilar backend con PyInstaller
        run: |
          cd backend
          .\venv\Scripts\activate

          # Crear spec file para Windows si no existe
          if (Test-Path anonidata-backend.spec) {
            # Usar spec existente
            pyinstaller --clean anonidata-backend.spec
          } else {
            # Crear build básico
            pyinstaller --onefile --console --name anonidata-backend --add-data "config;config" main.py
          }

          # Verificar que el ejecutable se creó
          if (Test-Path dist\anonidata-backend.exe) {
            Write-Host "Backend compilado correctamente: dist\anonidata-backend.exe"
            Get-Item dist\anonidata-backend.exe | Select-Object Name, Length
          } else {
            Write-Error "Error: No se generó el ejecutable del backend"
            exit 1
          }

      - name: Copiar backend a dist del proyecto
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item backend\dist\anonidata-backend.exe dist\anonidata-backend.exe
          Write-Host "Backend copiado a dist/"

      - name: Instalar dependencias Node.js
        run: npm ci

      - name: Compilar renderer
        run: npm run build:renderer

      - name: Compilar main process
        run: npm run build:main

      - name: Preparar configuración para Windows ARM64
        run: |
          Write-Host "========================================="
          Write-Host "Preparando configuración de Electron Forge para Windows ARM64"
          Write-Host "========================================="

          # Verificar que existe forge.config.windows-arm.js
          if (-not (Test-Path forge.config.windows-arm.js)) {
            Write-Error "forge.config.windows-arm.js no encontrado!"
            exit 1
          }

          # Backup de forge.config.js original (macOS)
          if (Test-Path forge.config.js) {
            Write-Host "Respaldando forge.config.js original (macOS)"
            Copy-Item forge.config.js forge.config.mac.backup.js
          }

          # Copiar configuración de Windows ARM64 como forge.config.js
          Write-Host "Copiando forge.config.windows-arm.js a forge.config.js"
          Copy-Item forge.config.windows-arm.js forge.config.js

          Write-Host "Contenido de forge.config.js (Windows ARM64):"
          Get-Content forge.config.js
          Write-Host "========================================="

      - name: Empaquetar aplicación para Windows ARM64
        run: |
          Write-Host "Iniciando empaquetado con Electron Forge..."
          Write-Host "Platform: win32"
          Write-Host "Arch: arm64"
          npx electron-forge make --arch=arm64 --platform=win32

      - name: Verificar artefactos generados
        run: |
          Write-Host "Contenido de out/make:"
          Get-ChildItem -Recurse out/make | Select-Object FullName, Length

      - name: Subir ZIP portable ARM64
        uses: actions/upload-artifact@v4
        with:
          name: Anonidata-Windows-ARM64-Portable
          path: out/make/zip/win32/arm64/*.zip
          if-no-files-found: error

      - name: Resumen del build
        run: |
          Write-Host "========================================"
          Write-Host "Build completado para Windows ARM64"
          Write-Host "========================================"
          Write-Host ""
          Write-Host "NOTA: Solo se genera ZIP para ARM64 (Squirrel no es compatible)"
          Write-Host ""
          Write-Host "Artefactos generados:"

          if (Test-Path out/make/zip/win32/arm64/*.zip) {
            Get-Item out/make/zip/win32/arm64/*.zip | ForEach-Object {
              Write-Host "  - $($_.Name) ($([math]::Round($_.Length / 1MB, 2)) MB)"
            }
          } else {
            Write-Error "No se encontro archivo ZIP generado"
            exit 1
          }
