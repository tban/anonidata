name: Build Windows x64

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Incrementar build number'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'backend/**'
      - 'package.json'
      - '.github/workflows/build-windows.yml'

# Evitar builds concurrentes
concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      # =========================================
      # 1. CHECKOUT Y SETUP
      # =========================================
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      # =========================================
      # 2. BACKEND PYTHON (PyInstaller)
      # =========================================
      - name: Crear entorno virtual Python
        shell: pwsh
        run: |
          cd backend
          python -m venv venv
          Write-Host "✓ Entorno virtual creado"

      - name: Instalar dependencias Python
        shell: pwsh
        run: |
          cd backend
          .\venv\Scripts\activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          Write-Host "✓ Dependencias Python instaladas"

      - name: Descargar modelo spaCy
        shell: pwsh
        run: |
          cd backend
          .\venv\Scripts\activate
          python -m spacy download es_core_news_sm
          Write-Host "✓ Modelo spaCy descargado"

      - name: Compilar backend con PyInstaller
        shell: pwsh
        run: |
          cd backend
          .\venv\Scripts\activate

          Write-Host "========================================="
          Write-Host "Compilando backend Python para Windows x64"
          Write-Host "========================================="

          # Usar spec específico de Windows si existe, sino el genérico
          if (Test-Path "anonidata-backend-win.spec") {
            Write-Host "Usando spec de Windows: anonidata-backend-win.spec"
            pyinstaller --clean anonidata-backend-win.spec
          } elseif (Test-Path "anonidata-backend.spec") {
            Write-Host "Usando spec genérico: anonidata-backend.spec"
            pyinstaller --clean anonidata-backend.spec
          } else {
            Write-Host "No se encontró .spec - creando build directo"
            pyinstaller --onefile --console --name anonidata-backend --add-data "config;config" main.py
          }

          # Verificar que el ejecutable se creó
          if (Test-Path "dist\anonidata-backend.exe") {
            $fileInfo = Get-Item "dist\anonidata-backend.exe"
            $sizeMB = [math]::Round($fileInfo.Length / 1MB, 2)
            Write-Host "✓ Backend compilado: anonidata-backend.exe ($sizeMB MB)"
          } else {
            Write-Error "✗ Error: No se generó anonidata-backend.exe"
            Get-ChildItem -Recurse dist\ | Select-Object FullName, Length
            exit 1
          }

      - name: Copiar backend al directorio binaries de Tauri
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri\binaries | Out-Null
          Copy-Item "backend\dist\anonidata-backend.exe" "src-tauri\binaries\anonidata-backend-x86_64-pc-windows-msvc.exe" -Force
          Write-Host "✓ Backend copiado a src-tauri\binaries\anonidata-backend-x86_64-pc-windows-msvc.exe"
          Get-Item "src-tauri\binaries\anonidata-backend-x86_64-pc-windows-msvc.exe" | Select-Object Name, Length

      # =========================================
      # 3. COMPILACIÓN TAURI (Vite + Rust/Tauri)
      # =========================================
      - name: Configurar Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Instalar dependencias Node.js
        run: npm ci

      - name: Compilar aplicación con Tauri
        run: npm run build

      - name: Verificar artefactos generados
        shell: pwsh
        run: |
          Write-Host "========================================="
          Write-Host "Artefactos en target/release/bundle/:"
          Write-Host "========================================="

          if (Test-Path "src-tauri/target/release/bundle") {
            Get-ChildItem -Recurse src-tauri/target/release/bundle\* -Include *.exe,*.msi | ForEach-Object {
              $sizeMB = [math]::Round($_.Length / 1MB, 2)
              Write-Host "  → $($_.Name) ($sizeMB MB)"
            }
          } else {
            Write-Error "Directorio de bundle de Tauri no encontrado"
            exit 1
          }

      # =========================================
      # 4. SUBIR ARTEFACTOS
      # =========================================
      - name: Subir instalador Windows Setup
        uses: actions/upload-artifact@v4
        with:
          name: AnoniData-Windows-x64-Setup
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30

      # =========================================
      # 5. RESUMEN
      # =========================================
      - name: Resumen del build
        shell: pwsh
        run: |
          Write-Host ""
          Write-Host "========================================"
          Write-Host "🚀 BUILD WINDOWS x64 COMPLETADO"
          Write-Host "========================================"
          Write-Host ""

          $packageJson = Get-Content "package.json" | ConvertFrom-Json
          Write-Host "  Versión: $($packageJson.version)"
          Write-Host "  Producto: $($packageJson.productName)"
          Write-Host ""
          Write-Host "  Artefactos disponibles para descarga"
          Write-Host "  en la pestaña Actions → Artifacts"
          Write-Host ""
          Write-Host "========================================"
